<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgP" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5f0ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6634;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff4500;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.7" />
    </linearGradient>
    <!-- Google-like multi-color dots -->
    <radialGradient id="dot1"><stop offset="0%" style="stop-color:#4285F4"/><stop offset="100%" style="stop-color:#4285F4;stop-opacity:0"/></radialGradient>
    <radialGradient id="dot2"><stop offset="0%" style="stop-color:#EA4335"/><stop offset="100%" style="stop-color:#EA4335;stop-opacity:0"/></radialGradient>
    <radialGradient id="dot3"><stop offset="0%" style="stop-color:#FBBC05"/><stop offset="100%" style="stop-color:#FBBC05;stop-opacity:0"/></radialGradient>
    <radialGradient id="dot4"><stop offset="0%" style="stop-color:#34A853"/><stop offset="100%" style="stop-color:#34A853;stop-opacity:0"/></radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#00000018"/>
    </filter>
    <filter id="shadowSm" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000012"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgP)" />

  <!-- Soft background blobs -->
  <circle cx="680" cy="80" r="160" fill="#ffceeb" opacity="0.35"/>
  <circle cx="100" cy="420" r="140" fill="#ff6634" opacity="0.07"/>
  <circle cx="720" cy="420" r="100" fill="#4285F4" opacity="0.06"/>

  <!-- ── Main canvas / interface card ── -->
  <rect x="200" y="60" width="400" height="280" rx="20" fill="url(#glassGrad)" filter="url(#shadow)" stroke="#e8e0f0" stroke-width="1"/>

  <!-- Card header bar -->
  <rect x="200" y="60" width="400" height="44" rx="20" fill="#faf7f4"/>
  <rect x="200" y="84" width="400" height="20" fill="#faf7f4"/>
  <!-- Window dots -->
  <circle cx="228" cy="82" r="6" fill="#EA4335" opacity="0.7"/>
  <circle cx="248" cy="82" r="6" fill="#FBBC05" opacity="0.7"/>
  <circle cx="268" cy="82" r="6" fill="#34A853" opacity="0.7"/>
  <!-- Header text -->
  <rect x="296" y="76" width="120" height="12" rx="6" fill="#e0d8f0" opacity="0.8"/>

  <!-- Brand palette strip (DNA scan) -->
  <rect x="224" y="122" width="352" height="48" rx="10" fill="#f5f0ff" stroke="#e8e0f0" stroke-width="1"/>
  <text x="236" y="140" font-family="Arial, sans-serif" font-size="9" fill="#9b8fb0" letter-spacing="1">ADN DE MARCA DETECTADO</text>
  <!-- Color swatches -->
  <circle cx="244" cy="155" r="10" fill="#ff6634"/>
  <circle cx="268" cy="155" r="10" fill="#ffceeb"/>
  <circle cx="292" cy="155" r="10" fill="#faf7f4"/>
  <circle cx="316" cy="155" r="10" fill="#1a1a2e"/>
  <!-- Tick -->
  <circle cx="358" cy="155" r="10" fill="#34A853" opacity="0.15"/>
  <path d="M352 155 l4 4 7-7" stroke="#34A853" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="376" y="150" width="90" height="10" rx="5" fill="#e0d8f0" opacity="0.7"/>
  <rect x="474" y="150" width="50" height="10" rx="5" fill="#34A853" opacity="0.25"/>

  <!-- Generated image placeholder -->
  <rect x="224" y="184" width="160" height="138" rx="10" fill="#ff6634" opacity="0.12" stroke="#ff6634" stroke-width="1" stroke-opacity="0.3"/>
  <!-- Abstract image content -->
  <rect x="232" y="192" width="144" height="80" rx="6" fill="#ff6634" opacity="0.18"/>
  <ellipse cx="304" cy="220" rx="28" ry="20" fill="#ff6634" opacity="0.35"/>
  <ellipse cx="330" cy="232" rx="18" ry="14" fill="#ffceeb" opacity="0.6"/>
  <rect x="232" y="282" width="90" height="8" rx="4" fill="#e0d8f0"/>
  <rect x="232" y="296" width="60" height="8" rx="4" fill="#ff6634" opacity="0.3"/>
  <!-- IA badge on image -->
  <rect x="336" y="192" width="36" height="18" rx="9" fill="#4285F4"/>
  <text x="354" y="205" font-family="Arial, sans-serif" font-size="8" fill="white" text-anchor="middle" font-weight="bold">IA</text>

  <!-- Generated copy lines -->
  <rect x="400" y="184" width="176" height="138" rx="10" fill="#f5f0ff" stroke="#e0d8f0" stroke-width="1"/>
  <rect x="412" y="198" width="96" height="10" rx="5" fill="#ff6634" opacity="0.5"/>
  <rect x="412" y="216" width="152" height="8" rx="4" fill="#d0c8e8"/>
  <rect x="412" y="230" width="140" height="8" rx="4" fill="#d0c8e8" opacity="0.7"/>
  <rect x="412" y="244" width="120" height="8" rx="4" fill="#d0c8e8" opacity="0.6"/>
  <rect x="412" y="264" width="152" height="8" rx="4" fill="#d0c8e8" opacity="0.5"/>
  <rect x="412" y="278" width="110" height="8" rx="4" fill="#d0c8e8" opacity="0.4"/>
  <!-- Copy badge -->
  <rect x="412" y="298" width="64" height="18" rx="9" fill="#ff6634" opacity="0.9"/>
  <text x="444" y="311" font-family="Arial, sans-serif" font-size="8" fill="white" text-anchor="middle" font-weight="bold">GENERAR +</text>

  <!-- ── Floating "web scan" badge (left) ── -->
  <rect x="60" y="130" width="118" height="88" rx="16" fill="white" filter="url(#shadowSm)" stroke="#f0e8ff" stroke-width="1"/>
  <!-- Globe icon -->
  <circle cx="92" cy="160" r="14" fill="#4285F4" opacity="0.12"/>
  <circle cx="92" cy="160" r="8" fill="none" stroke="#4285F4" stroke-width="1.8"/>
  <line x1="84" y1="160" x2="100" y2="160" stroke="#4285F4" stroke-width="1.5"/>
  <line x1="92" y1="152" x2="92" y2="168" stroke="#4285F4" stroke-width="1.5"/>
  <ellipse cx="92" cy="160" rx="4" ry="8" fill="none" stroke="#4285F4" stroke-width="1.2"/>
  <rect x="74" y="178" width="50" height="7" rx="3.5" fill="#e0d8f0"/>
  <rect x="74" y="192" width="36" height="7" rx="3.5" fill="#4285F4" opacity="0.3"/>
  <text x="119" y="165" font-family="Arial, sans-serif" font-size="9" fill="#9b8fb0">web</text>
  <text x="119" y="177" font-family="Arial, sans-serif" font-size="9" fill="#9b8fb0">scan</text>

  <!-- Animated scan line effect -->
  <rect x="60" y="190" width="118" height="2" rx="1" fill="#4285F4" opacity="0.25"/>

  <!-- ── Floating "campaign ready" badge (right) ── -->
  <rect x="622" y="130" width="118" height="88" rx="16" fill="white" filter="url(#shadowSm)" stroke="#f0e8ff" stroke-width="1"/>
  <circle cx="654" cy="158" r="14" fill="#34A853" opacity="0.12"/>
  <path d="M646 158 l5 5 9-10" stroke="#34A853" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="638" y="178" width="62" height="7" rx="3.5" fill="#e0d8f0"/>
  <rect x="638" y="191" width="48" height="7" rx="3.5" fill="#34A853" opacity="0.3"/>
  <text x="672" y="163" font-family="Arial, sans-serif" font-size="8" fill="#9b8fb0">campaña</text>
  <text x="672" y="175" font-family="Arial, sans-serif" font-size="8" fill="#34A853" font-weight="bold">lista ✓</text>

  <!-- ── Bottom stats row ── -->
  <rect x="200" y="358" width="400" height="68" rx="16" fill="white" filter="url(#shadowSm)" stroke="#ede8f8" stroke-width="1"/>

  <g transform="translate(230, 372)">
    <circle cx="16" cy="16" r="14" fill="#EA4335" opacity="0.1"/>
    <text x="16" y="21" font-family="Arial" font-size="14" text-anchor="middle">🎨</text>
    <rect x="38" y="10" width="56" height="8" rx="4" fill="#e0d8f0"/>
    <rect x="38" y="24" width="36" height="8" rx="4" fill="#EA4335" opacity="0.3"/>
  </g>

  <line x1="380" y1="366" x2="380" y2="418" stroke="#ede8f8" stroke-width="1"/>

  <g transform="translate(396, 372)">
    <circle cx="16" cy="16" r="14" fill="#FBBC05" opacity="0.12"/>
    <text x="16" y="21" font-family="Arial" font-size="14" text-anchor="middle">✍️</text>
    <rect x="38" y="10" width="56" height="8" rx="4" fill="#e0d8f0"/>
    <rect x="38" y="24" width="44" height="8" rx="4" fill="#FBBC05" opacity="0.4"/>
  </g>

  <!-- Google Labs label -->
  <g transform="translate(280, 446)">
    <circle cx="10" cy="8" r="7" fill="#4285F4"/>
    <circle cx="30" cy="8" r="7" fill="#EA4335"/>
    <circle cx="50" cy="8" r="7" fill="#FBBC05"/>
    <circle cx="70" cy="8" r="7" fill="#34A853"/>
    <text x="90" y="13" font-family="Arial, sans-serif" font-size="11" fill="#9b8fb0" font-weight="bold">Google Labs · DeepMind</text>
  </g>
</svg>
