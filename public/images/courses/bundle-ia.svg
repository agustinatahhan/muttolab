<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#faf7f4"/>
      <stop offset="100%" style="stop-color:#f0ebe4"/>
    </linearGradient>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#00000014"/>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="3" stdDeviation="8" flood-color="#0000000d"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgB)"/>

  <!-- Soft blobs -->
  <circle cx="680" cy="80"  r="180" fill="#ffceeb" opacity="0.3"/>
  <circle cx="100" cy="430" r="150" fill="#ff6634" opacity="0.06"/>

  <!-- ── Card 1 · IA ── (left, slightly rotated back) -->
  <g transform="rotate(-5, 220, 250)">
    <rect x="80" y="120" width="230" height="280" rx="20" fill="white" filter="url(#cardShadow)"/>
    <!-- header accent -->
    <rect x="80" y="120" width="230" height="56" rx="20" fill="#ff6634"/>
    <rect x="80" y="152" width="230" height="24" fill="#ff6634"/>
    <!-- header icon -->
    <circle cx="116" cy="149" r="14" fill="white" opacity="0.2"/>
    <text x="116" y="155" font-family="Arial" font-size="14" text-anchor="middle" fill="white">🤖</text>
    <text x="200" y="145" font-family="Arial, sans-serif" font-size="11" fill="white" font-weight="bold" text-anchor="middle">Taller de IA</text>
    <text x="200" y="162" font-family="Arial, sans-serif" font-size="9" fill="white" opacity="0.8" text-anchor="middle">ChatGPT · Claude · Gemini</text>
    <!-- body lines -->
    <rect x="100" y="196" width="160" height="9" rx="4.5" fill="#f0ebe4"/>
    <rect x="100" y="213" width="130" height="9" rx="4.5" fill="#f0ebe4"/>
    <rect x="100" y="230" width="150" height="9" rx="4.5" fill="#f0ebe4"/>
    <!-- divider -->
    <line x1="100" y1="252" x2="290" y2="252" stroke="#f0ebe4" stroke-width="1"/>
    <!-- tag pills -->
    <rect x="100" y="264" width="70" height="20" rx="10" fill="#ffece5"/>
    <text x="135" y="278" font-family="Arial" font-size="9" fill="#ff6634" text-anchor="middle">Presencial</text>
    <rect x="180" y="264" width="48" height="20" rx="10" fill="#ffece5"/>
    <text x="204" y="278" font-family="Arial" font-size="9" fill="#ff6634" text-anchor="middle">3 hs</text>
    <!-- cta -->
    <rect x="100" y="356" width="190" height="30" rx="15" fill="#ff6634" opacity="0.12"/>
    <text x="195" y="375" font-family="Arial" font-size="10" fill="#ff6634" text-anchor="middle" font-weight="bold">Semana 1</text>
  </g>

  <!-- ── Card 2 · NotebookLM ── (center, straight) -->
  <rect x="285" y="100" width="230" height="300" rx="20" fill="white" filter="url(#cardShadow)"/>
  <!-- header accent -->
  <rect x="285" y="100" width="230" height="56" rx="20" fill="#1a1a2e"/>
  <rect x="285" y="132" width="230" height="24" fill="#1a1a2e"/>
  <circle cx="321" cy="129" r="14" fill="white" opacity="0.1"/>
  <text x="321" y="135" font-family="Arial" font-size="14" text-anchor="middle" fill="white">📓</text>
  <text x="405" y="125" font-family="Arial, sans-serif" font-size="11" fill="white" font-weight="bold" text-anchor="middle">NotebookLM</text>
  <text x="405" y="142" font-family="Arial, sans-serif" font-size="9" fill="white" opacity="0.7" text-anchor="middle">Google · Cerebro digital</text>
  <!-- body lines -->
  <rect x="305" y="176" width="160" height="9" rx="4.5" fill="#f0ebe4"/>
  <rect x="305" y="193" width="140" height="9" rx="4.5" fill="#f0ebe4"/>
  <rect x="305" y="210" width="155" height="9" rx="4.5" fill="#f0ebe4"/>
  <!-- highlighted block -->
  <rect x="305" y="230" width="190" height="36" rx="8" fill="#ffceeb" opacity="0.4"/>
  <rect x="305" y="237" width="130" height="8" rx="4" fill="#ff6634" opacity="0.4"/>
  <rect x="305" y="251" width="100" height="8" rx="4" fill="#ff6634" opacity="0.25"/>
  <!-- divider -->
  <line x1="305" y1="280" x2="495" y2="280" stroke="#f0ebe4" stroke-width="1"/>
  <!-- tag pills -->
  <rect x="305" y="292" width="70" height="20" rx="10" fill="#f0ebe4"/>
  <text x="340" y="306" font-family="Arial" font-size="9" fill="#666" text-anchor="middle">Presencial</text>
  <rect x="385" y="292" width="48" height="20" rx="10" fill="#f0ebe4"/>
  <text x="409" y="306" font-family="Arial" font-size="9" fill="#666" text-anchor="middle">3 hs</text>
  <!-- cta -->
  <rect x="305" y="374" width="190" height="30" rx="15" fill="#1a1a2e" opacity="0.08"/>
  <text x="400" y="393" font-family="Arial" font-size="10" fill="#1a1a2e" text-anchor="middle" font-weight="bold">Semana 2</text>

  <!-- ── Card 3 · Pomelli ── (right, slightly rotated) -->
  <g transform="rotate(5, 580, 250)">
    <rect x="490" y="120" width="230" height="280" rx="20" fill="white" filter="url(#cardShadow)"/>
    <!-- header accent: white/glass with google colors -->
    <rect x="490" y="120" width="230" height="56" rx="20" fill="#f8f8ff"/>
    <rect x="490" y="152" width="230" height="24" fill="#f8f8ff"/>
    <!-- google dots -->
    <circle cx="516" cy="139" r="7" fill="#4285F4"/>
    <circle cx="532" cy="139" r="7" fill="#EA4335"/>
    <circle cx="548" cy="139" r="7" fill="#FBBC05"/>
    <circle cx="564" cy="139" r="7" fill="#34A853"/>
    <text x="625" y="134" font-family="Arial, sans-serif" font-size="11" fill="#333" font-weight="bold" text-anchor="middle">Pomelli</text>
    <text x="625" y="150" font-family="Arial, sans-serif" font-size="9" fill="#888" text-anchor="middle">Google Labs · DeepMind</text>
    <!-- body lines -->
    <rect x="510" y="196" width="160" height="9" rx="4.5" fill="#f0ebe4"/>
    <rect x="510" y="213" width="130" height="9" rx="4.5" fill="#f0ebe4"/>
    <rect x="510" y="230" width="150" height="9" rx="4.5" fill="#f0ebe4"/>
    <!-- divider -->
    <line x1="510" y1="252" x2="700" y2="252" stroke="#f0ebe4" stroke-width="1"/>
    <!-- tag pills -->
    <rect x="510" y="264" width="70" height="20" rx="10" fill="#e8f5e9"/>
    <text x="545" y="278" font-family="Arial" font-size="9" fill="#34A853" text-anchor="middle">Presencial</text>
    <rect x="590" y="264" width="56" height="20" rx="10" fill="#e8f5e9"/>
    <text x="618" y="278" font-family="Arial" font-size="9" fill="#34A853" text-anchor="middle">2 a 4 hs</text>
    <!-- cta -->
    <rect x="510" y="356" width="190" height="30" rx="15" fill="#4285F4" opacity="0.1"/>
    <text x="605" y="375" font-family="Arial" font-size="10" fill="#4285F4" text-anchor="middle" font-weight="bold">Semana 3</text>
  </g>

  <!-- ── Bottom label ── -->
  <text x="400" y="466" font-family="Arial, sans-serif" font-size="12" fill="#c4b5a5" text-anchor="middle" letter-spacing="5">PROGRAMA COMPLETO · 3 SEMANAS</text>
</svg>
