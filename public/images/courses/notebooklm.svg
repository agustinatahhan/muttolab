<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#faf7f4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0ebe4;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg2)" />

  <!-- Decorative circle top-right -->
  <circle cx="720" cy="-20" r="180" fill="#ffceeb" opacity="0.4"/>
  <!-- Decorative circle bottom-left -->
  <circle cx="-40" cy="480" r="160" fill="#ff6634" opacity="0.08"/>

  <!-- Notebook / document shape -->
  <rect x="220" y="60" width="360" height="380" rx="18" fill="white" opacity="0.95" filter="drop-shadow(0 8px 32px rgba(0,0,0,0.08))"/>

  <!-- Notebook spine accent -->
  <rect x="220" y="60" width="36" height="380" rx="18" fill="#ff6634" opacity="0.9"/>
  <circle cx="238" cy="120" r="5" fill="white" opacity="0.8"/>
  <circle cx="238" cy="180" r="5" fill="white" opacity="0.8"/>
  <circle cx="238" cy="240" r="5" fill="white" opacity="0.8"/>
  <circle cx="238" cy="300" r="5" fill="white" opacity="0.8"/>
  <circle cx="238" cy="360" r="5" fill="white" opacity="0.8"/>

  <!-- Document lines -->
  <g fill="#e8e0d8" rx="3">
    <rect x="276" y="110" width="260" height="10" rx="5"/>
    <rect x="276" y="138" width="220" height="10" rx="5"/>
    <rect x="276" y="166" width="240" height="10" rx="5"/>
  </g>

  <!-- Highlighted text block -->
  <rect x="276" y="204" width="264" height="36" rx="8" fill="#ffceeb" opacity="0.5"/>
  <rect x="276" y="210" width="200" height="10" rx="5" fill="#ff6634" opacity="0.6"/>
  <rect x="276" y="224" width="160" height="10" rx="5" fill="#ff6634" opacity="0.4"/>

  <!-- More lines -->
  <g fill="#e8e0d8">
    <rect x="276" y="260" width="240" height="10" rx="5"/>
    <rect x="276" y="280" width="180" height="10" rx="5"/>
    <rect x="276" y="300" width="220" height="10" rx="5"/>
  </g>

  <!-- Checkmarks / tasks -->
  <g transform="translate(276, 328)">
    <rect width="16" height="16" rx="4" fill="#ff6634" opacity="0.15"/>
    <path d="M3 8l4 4 6-7" stroke="#ff6634" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="24" y="3" width="120" height="10" rx="5" fill="#e8e0d8"/>
  </g>
  <g transform="translate(276, 354)">
    <rect width="16" height="16" rx="4" fill="#ff6634" opacity="0.15"/>
    <path d="M3 8l4 4 6-7" stroke="#ff6634" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="24" y="3" width="90" height="10" rx="5" fill="#e8e0d8"/>
  </g>
  <g transform="translate(276, 380)">
    <rect width="16" height="16" rx="4" fill="#e8e0d8" opacity="0.5"/>
    <rect x="24" y="3" width="140" height="10" rx="5" fill="#e8e0d8" opacity="0.5"/>
  </g>

  <!-- Floating productivity badge -->
  <rect x="530" y="130" width="120" height="48" rx="14" fill="#ff6634" opacity="0.95" filter="drop-shadow(0 4px 16px rgba(255,102,52,0.3))"/>
  <text x="590" y="151" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="bold">PRODUCTIVO</text>
  <text x="590" y="167" font-family="Arial, sans-serif" font-size="10" fill="white" opacity="0.8" text-anchor="middle">+80% eficiencia</text>

  <!-- Small floating card -->
  <rect x="100" y="180" width="100" height="72" rx="12" fill="white" opacity="0.95" filter="drop-shadow(0 4px 16px rgba(0,0,0,0.07))"/>
  <circle cx="125" cy="206" r="12" fill="#ffceeb"/>
  <rect x="144" y="200" width="44" height="8" rx="4" fill="#e8e0d8"/>
  <rect x="115" y="226" width="74" height="8" rx="4" fill="#ff6634" opacity="0.3"/>
  <rect x="115" y="240" width="56" height="8" rx="4" fill="#e8e0d8"/>

  <!-- Label -->
  <text x="400" y="470" font-family="Arial, sans-serif" font-size="13" fill="#c4b5a5" text-anchor="middle" letter-spacing="6">PRODUCTIVIDAD DIGITAL</text>
</svg>
